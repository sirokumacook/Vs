<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フルスクリーン神域版！増援制限バトルロイヤル</title>
<style>
    html, body {
        margin: 0; padding: 0;
        width: 100vw; height: 100vh;
        overflow: hidden;
        background-color: #000;
        font-family: sans-serif;
    }
    canvas {
        display: block;
        width: 100vw; height: 100vh;
        background-color: #0a0a1a;
    }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const aspectRatio = window.innerHeight / window.innerWidth;
    canvas.width = 3000;
    canvas.height = 3000 * aspectRatio;

    const adjectives = [
        "炎の", "氷の", "雷の", "光の", "闇の", "風の", "土の", "毒の", "鉄の", "幻の", 
        "水の", "星の", "竜の", "霊の", "血の", "鋼の", "獣の", "聖なる", "魔の", "影の",
        "太陽の", "月の", "宇宙の", "爆炎の", "絶対零度の", "疾風の", "轟雷の", "漆黒の", "閃光の", "猛毒の",
        "黄金の", "白銀の", "銅の", "泥の", "砂の", "結晶の", "音の", "磁力の", "重力の", "時間の",
        "空間の", "夢の", "悪夢の", "奇跡の", "絶望の", "希望の", "呪いの", "祝福の", "怒りの", "悲しみの",
        "喜びの", "愛の", "憎しみの", "虚無の", "混沌の", "秩序の", "創造の", "破壊の", "生命の", "死の",
        "狂気の", "運命の", "業火の", "神の", "悪魔の", "精霊の", "妖精の", "鬼の", "修羅の", "仏の",
        "変異の", "未知の"
    ];

    const nouns = [
        "戦士", "魔法使い", "僧侶", "盗賊", "狩人", "騎士", "暗殺者", "召喚士", "賢者", "武闘家", 
        "狂戦士", "狙撃手", "踊り子", "巨漢", "吸血鬼", "死霊術師", "錬金術師", "吟遊詩人", "侍", "忍者",
        "魔王", "勇者", "銃士", "海賊", "傭兵", "槍使い", "弓使い", "斧使い", "力士", "プロレスラー",
        "預言者", "占い師", "遊び人", "商人", "貴族", "王様", "皇帝", "奴隷", "英雄", "覇王",
        "守護者", "破壊者", "創造主", "冒険者", "旅人", "亡霊", "ゾンビ", "ゴーレム", "サイボーグ", "エイリアン",
        "スライム", "ドラゴン", "デーモン", "エンジェル", "退魔師", "魔物使い", "調教師", "ギャンブラー", "道化師", "料理人",
        "鍛冶屋", "木こり", "釣り人", "農民", "学者", "発明家", "機工士", "メイド", "執事", "怪盗",
        "トリックスター", "変身者"
    ];
    
    let roles = [];
    for (let a of adjectives) for (let n of nouns) roles.push({ name: a + n, adj: a, noun: n });
    roles.sort(() => Math.random() - 0.5);

    let circles = [];
    let projectiles = [];
    let trails = [];
    let particles = [];

    // 増援の管理用変数
    let alertMessage = "";
    let alertTimer = 0;
    let reinforcementCount = 0; // 増援が発生した回数

    let safeZone = {
        x: canvas.width / 2, y: canvas.height / 2,
        r: Math.max(canvas.width, canvas.height) * 0.8,
        targetX: Math.random() * (canvas.width - 600) + 300,
        targetY: Math.random() * (canvas.height - 600) + 300
    };

    class Particle {
        constructor(x, y, color, size, speed) {
            this.x = x; this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const s = Math.random() * speed;
            this.vx = Math.cos(angle) * s; this.vy = Math.sin(angle) * s;
            this.color = color; this.size = size; this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.01;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    function createExplosion(x, y, color, count, size, speed) {
        for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, size, speed));
    }

    class Circle {
        constructor(id, roleObj, isClone = false, startX, startY) {
            this.id = isClone ? id + "_clone" : id;
            this.isClone = isClone;
            this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            this.opacity = 1.0;
            this.burn = 0; this.slow = 0; this.poison = 0;
            this.cooldown = 0; this.timer = 0; this.kills = 0;
            
            this.x = startX !== undefined ? startX : Math.random() * (canvas.width - 60) + 30;
            this.y = startY !== undefined ? startY : Math.random() * (canvas.height - 60) + 30;

            this.applyRole(roleObj.adj, roleObj.noun, true);

            const angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * this.currentSpeed;
            this.vy = Math.sin(angle) * this.currentSpeed;
        }

        applyRole(adj, noun, isInit = false) {
            this.adj = adj;
            this.noun = noun;
            this.roleName = adj + noun;
            
            this.r = 22;
            this.baseSpeed = Math.random() * 2.5 + 2.0;
            let newMaxHp = Math.floor(Math.random() * 150) + 100; 
            this.attack = Math.floor(Math.random() * 15) + 10;

            this.evasion = 0; this.defense = 0; this.knockbackResist = 1.0;
            this.ignoreDef = false; this.immune = false; this.shield = false; this.firstStrike = false;
            this.reflect = false;

            switch(this.adj) {
                case "雷の": case "轟雷の": case "閃光の": this.baseSpeed *= 2.5; break;
                case "土の": case "鋼の": case "結晶の": this.defense += 30; this.knockbackResist = 0.1; break;
                case "鉄の": this.reflect = true; break;
                case "幻の": case "夢の": case "影の": this.evasion += 0.5; this.opacity = 0.5; break;
                case "水の": case "生命の": this.immune = true; break;
                case "竜の": case "神の": case "悪魔の": case "創造の": case "破壊の":
                    newMaxHp *= 5.0; this.attack *= 4.0; this.r += 15; break;
                case "霊の": case "虚無の": this.ignoreDef = true; this.opacity = 0.7; break;
                case "血の": case "狂気の": case "絶望の": newMaxHp *= 0.3; this.attack *= 6.0; break;
            }

            switch(this.noun) {
                case "戦士": case "剣士": case "斧使い": newMaxHp += 150; this.attack += 20; break;
                case "巨漢": case "力士": case "ゴーレム": this.r *= 3.5; newMaxHp *= 6.0; this.knockbackResist = 0; break;
                case "狙撃手": case "スナイパー": case "ガンナー":
                    newMaxHp *= 0.5; this.attack *= 50; this.baseSpeed *= 0.05; break;
                case "侍": case "剣聖": this.firstStrike = true; break;
                case "魔王": case "勇者": case "覇王": case "皇帝": case "創造主":
                    newMaxHp *= 6.0; this.attack *= 5.0; this.r += 20; break;
                case "遊び人": case "道化師": case "ギャンブラー": this.evasion += 0.6; break;
                case "スライム": case "ゾンビ": this.immune = true; newMaxHp *= 0.8; break;
            }

            if (isInit) {
                this.maxHp = newMaxHp;
                this.hp = this.maxHp;
            } else {
                let hpRatio = this.hp / this.maxHp;
                this.maxHp = newMaxHp;
                this.hp = this.maxHp * hpRatio;
                createExplosion(this.x, this.y, "white", 40, 6, 8); 
            }
            this.currentSpeed = this.baseSpeed;
        }

        update() {
            if (this.hp <= 0) return;
            this.timer++;
            if (this.cooldown > 0) this.cooldown--;

            if (this.noun === "トリックスター" && this.timer % 400 === 0) {
                for (let c of circles) {
                    if (c.hp > 0 && c.id !== this.id && !c.isClone) {
                        let randomAdj = adjectives[Math.floor(Math.random() * adjectives.length)];
                        let randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
                        c.applyRole(randomAdj, randomNoun);
                    }
                }
            }

            if (["混沌の", "未知の"].includes(this.adj) || ["変身者"].includes(this.noun)) {
                if (this.timer % 250 === 0) {
                    let randomAdj = adjectives[Math.floor(Math.random() * adjectives.length)];
                    let randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
                    this.applyRole(randomAdj, randomNoun);
                }
            }

            let distToSafe = Math.hypot(this.x - safeZone.x, this.y - safeZone.y);
            if (distToSafe > safeZone.r) {
                this.hp -= 1.0; 
                if(this.timer % 5 === 0) createExplosion(this.x, this.y, "red", 3, 5, 3);
            }

            if (this.burn > 0) { this.hp -= 1.0; this.burn--; createExplosion(this.x, this.y, "orange", 1, 4, 2); }
            if (this.poison > 0) { this.hp -= this.maxHp * 0.005; this.poison--; }
            if (this.slow > 0) { this.currentSpeed = this.baseSpeed * 0.2; this.slow--; } else { this.currentSpeed = this.baseSpeed; }

            if (["魔法使い", "魔女", "妖術師"].includes(this.noun) && this.timer % 60 === 0) this.shoot8Way(12, this.attack);
            if (["狙撃手", "スナイパー", "ガンナー"].includes(this.noun) && this.timer % 90 === 0) this.shoot(60, this.attack * 100, true); 
            if (["錬金術師", "毒の", "猛毒の"].includes(this.adj) && this.timer % 15 === 0) trails.push({ x: this.x, y: this.y, life: 250, owner: this, r: 60 });
            if (["僧侶", "神官", "司教"].includes(this.noun) && this.hp < this.maxHp * 0.5 && !this.usedPriestHeal) {
                this.hp += this.maxHp * 2.0; this.usedPriestHeal = true;
                createExplosion(this.x, this.y, "lime", 60, 8, 6);
            }
            if (["忍者", "怪盗"].includes(this.noun) && this.timer % 80 === 0) {
                createExplosion(this.x, this.y, "white", 30, 6, 5);
                this.teleportBehindNearest();
            }

            let speedMod = Math.hypot(this.vx, this.vy);
            if (speedMod > 0) {
                this.vx = (this.vx / speedMod) * this.currentSpeed;
                this.vy = (this.vy / speedMod) * this.currentSpeed;
            }
            this.x += this.vx; this.y += this.vy;

            if (this.x - this.r < 0 || this.x + this.r > canvas.width) this.vx *= -1;
            if (this.y - this.r < 0 || this.y + this.r > canvas.height) this.vy *= -1;
            this.x = Math.max(this.r, Math.min(this.x, canvas.width - this.r));
            this.y = Math.max(this.r, Math.min(this.y, canvas.height - this.r));

            for (let other of circles) {
                if (other.id === this.id || other.hp <= 0) continue;
                let dx = this.x - other.x; let dy = this.y - other.y;
                let dist = Math.hypot(dx, dy);

                if (dist < this.r + other.r) {
                    let push = 10 * this.knockbackResist;
                    if (["風の", "疾風の", "爆炎の"].includes(this.adj)) { push = 60 * this.knockbackResist; createExplosion(this.x, this.y, "white", 15, 5, 10); } 
                    this.vx = (dx / dist) * push; this.vy = (dy / dist) * push;

                    if (this.cooldown === 0) {
                        this.dealDamageTo(other);
                        this.cooldown = ["武闘家", "拳法家", "格闘家"].includes(this.noun) ? 2 : 12;
                        if (["騎士", "守護者"].includes(other.noun)) other.cooldown = 20;
                    }
                }
            }
        }

        dealDamageTo(target) {
            if (Math.random() < target.evasion && !this.ignoreDef) { createExplosion(target.x, target.y, "gray", 8, 3, 3); return; }
            if (target.shield) { target.shield = false; createExplosion(target.x, target.y, "gold", 30, 6, 8); return; }

            if (this.adj === "変異の" && Math.random() < 0.25 && !target.isClone) {
                let randomAdj = adjectives[Math.floor(Math.random() * adjectives.length)];
                let randomNoun = nouns[Math.floor(Math.random() * nouns.length)];
                target.applyRole(randomAdj, randomNoun);
            }

            let actualDamage = ["狂戦士", "破壊者"].includes(this.noun) ? this.attack * (1 + (4 * (1 - this.hp / this.maxHp))) : this.attack;
            
            if (["暗殺者", "忍者"].includes(this.noun) && Math.random() < 0.25) { 
                actualDamage *= 15; createExplosion(target.x, target.y, "red", 50, 8, 12);
            }
            if (this.firstStrike) { 
                actualDamage *= 30; this.firstStrike = false; createExplosion(target.x, target.y, "white", 80, 7, 20);
            }

            if (!this.ignoreDef) actualDamage = Math.max(1, actualDamage - target.defense);
            target.hp -= actualDamage;
            createExplosion(target.x, target.y, this.color, 8, 4, 6);

            if (!target.immune) {
                if (["炎の", "爆炎の", "業火の", "太陽の"].includes(this.adj)) target.burn = 150;
                if (["氷の", "絶対零度の"].includes(this.adj)) target.slow = 150;
                if (["毒の", "猛毒の"].includes(this.adj)) target.poison = 150;
            }

            if (["闇の", "悪魔の"].includes(this.adj)) this.hp = Math.min(this.maxHp, this.hp + actualDamage);
            if (target.reflect) this.hp -= actualDamage * 0.8; 

            if (target.hp <= 0) {
                this.kills++;
                createExplosion(target.x, target.y, target.color, 120, 8, 15);
                if (["吸血鬼", "ヴァンパイアハンター"].includes(this.noun)) { this.hp = this.maxHp; createExplosion(this.x, this.y, "red", 40, 6, 6); }
                handleDeath(target);
            }
        }

        shoot(speed, dmg, isLaser = false) {
            let target = this.getNearestEnemy();
            if (!target) return;
            let dx = target.x - this.x; let dy = target.y - this.y;
            let dist = Math.hypot(dx, dy);
            projectiles.push({
                x: this.x, y: this.y, vx: (dx/dist)*speed, vy: (dy/dist)*speed,
                dmg: dmg, owner: this, life: isLaser ? 300 : 150, size: isLaser ? 25 : 8, color: isLaser ? "#ff00ff" : "cyan"
            });
        }

        shoot8Way(speed, dmg) {
            for (let i = 0; i < 8; i++) {
                let angle = (Math.PI / 4) * i;
                projectiles.push({
                    x: this.x, y: this.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    dmg: dmg, owner: this, life: 150, size: 10, color: "#00ffff"
                });
            }
        }

        getNearestEnemy() {
            let target = null, minDist = 99999;
            for (let c of circles) {
                if (c.id !== this.id && c.hp > 0) {
                    let d = Math.hypot(this.x - c.x, this.y - c.y);
                    if (d < minDist) { minDist = d; target = c; }
                }
            }
            return target;
        }

        teleportBehindNearest() {
            let target = this.getNearestEnemy();
            if (target) { this.x = target.x - target.vx * 30; this.y = target.y - target.vy * 30; }
        }

        draw() {
            if (this.hp <= 0) return;
            ctx.globalAlpha = this.opacity;

            if (this.shield) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r + 12, 0, Math.PI * 2);
                ctx.strokeStyle = "gold"; ctx.lineWidth = 6; ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();
            
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#fff"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(this.isClone ? "分身" : this.roleName, this.x, this.y - this.r - 15);

            const barWidth = this.r * 2.5; 
            ctx.fillStyle = "red"; ctx.fillRect(this.x - barWidth / 2, this.y - this.r - 10, barWidth, 8);
            ctx.fillStyle = "lime"; ctx.fillRect(this.x - barWidth / 2, this.y - this.r - 10, barWidth * (this.hp / this.maxHp), 8);
        }
    }

    function handleDeath(deadCircle) {
        // 現在生き残っている人数を計算
        let currentAlive = circles.filter(c => c.hp > 0).length;

        // 分身が倒された時の条件：200人以下 ＆ 増援回数3回未満
        if (deadCircle.isClone && currentAlive <= 200 && reinforcementCount < 3) {
            reinforcementCount++;
            alertMessage = `⚠️ 分身討伐！ エリア外から100人が乱入！ (増援 ${reinforcementCount}/3) ⚠️`;
            alertTimer = 180; 
            
            for(let i=0; i<100; i++) {
                let randomRole = {
                    adj: adjectives[Math.floor(Math.random() * adjectives.length)],
                    noun: nouns[Math.floor(Math.random() * nouns.length)]
                };
                randomRole.name = randomRole.adj + randomRole.noun;

                let edge = Math.floor(Math.random() * 4);
                let startX, startY;
                if (edge === 0) { startX = Math.random() * canvas.width; startY = 30; } 
                else if (edge === 1) { startX = canvas.width - 30; startY = Math.random() * canvas.height; } 
                else if (edge === 2) { startX = Math.random() * canvas.width; startY = canvas.height - 30; } 
                else { startX = 30; startY = Math.random() * canvas.height; } 

                let reinforce = new Circle("reinforce_" + Math.random(), randomRole, false, startX, startY);
                
                let rushAngle = Math.atan2(safeZone.y - startY, safeZone.x - startX);
                reinforce.vx = Math.cos(rushAngle) * reinforce.currentSpeed;
                reinforce.vy = Math.sin(rushAngle) * reinforce.currentSpeed;

                circles.push(reinforce);
            }
            createExplosion(deadCircle.x, deadCircle.y, "white", 100, 5, 15); 
        }
        
        if (["召喚士", "魔物使い"].includes(deadCircle.noun) && !deadCircle.isClone) {
            for(let i=0; i<6; i++) {
                let clone = new Circle(deadCircle.id, {name: "分身", adj: "無", noun: "無"}, true, deadCircle.x + (Math.random()*100-50), deadCircle.y + (Math.random()*100-50));
                clone.maxHp = 100; clone.hp = 100; clone.attack = deadCircle.attack; clone.r = 15; clone.color = deadCircle.color;
                circles.push(clone);
                createExplosion(clone.x, clone.y, "purple", 20, 6, 8);
            }
        }
        
        for (let c of circles) {
            if (c.hp > 0 && ["死霊術師", "ネクロマンサー", "悪魔の"].includes(c.noun || c.adj)) {
                c.maxHp += 80; c.hp += 80; c.attack += 15; c.r += 2;
                createExplosion(c.x, c.y, "black", 30, 7, 5);
            }
        }
    }

    for (let i = 0; i < 100; i++) circles.push(new Circle(i, roles[i]));

    function loop() {
        ctx.fillStyle = "#0a0a1a"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        safeZone.r -= 0.25; 
        if (safeZone.r < 0) safeZone.r = 0;
        safeZone.x += (safeZone.targetX - safeZone.x) * 0.0015; 
        safeZone.y += (safeZone.targetY - safeZone.y) * 0.0015;

        for (let i = trails.length - 1; i >= 0; i--) {
            let t = trails[i]; t.life--;
            ctx.fillStyle = `rgba(148, 0, 211, ${t.life / 250 * 0.7})`;
            ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
            for (let c of circles) {
                if (c.hp > 0 && c.id !== t.owner.id && Math.hypot(c.x - t.x, c.y - t.y) < t.r + c.r) {
                    if(!c.immune) { c.hp -= 2.0; createExplosion(c.x, c.y, "purple", 2, 4, 3); }
                }
            }
            if (t.life <= 0) trails.splice(i, 1);
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.vx; p.y += p.vy; p.life--;
            ctx.fillStyle = p.color; ctx.shadowBlur = 20; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; 

            let hit = false;
            for (let c of circles) {
                if (c.hp > 0 && c.id !== p.owner.id && Math.hypot(c.x - p.x, c.y - p.y) < p.size + c.r) {
                    p.owner.dealDamageTo(c); hit = true; break;
                }
            }
            if (hit || p.life <= 0) projectiles.splice(i, 1);
        }

        let aliveCount = 0; let mainWinner = null;
        
        for (let i = circles.length - 1; i >= 0; i--) {
            let c = circles[i];
            if (c.hp <= 0) {
                circles.splice(i, 1);
                continue;
            }
            c.update(); c.draw();
            aliveCount++; 
            if (!c.isClone) mainWinner = c;
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height); 
        ctx.arc(safeZone.x, safeZone.y, safeZone.r, 0, Math.PI * 2, true); 
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 50, 50, 0.8)"; ctx.lineWidth = 6;
        ctx.beginPath(); ctx.arc(safeZone.x, safeZone.y, safeZone.r, 0, Math.PI * 2); ctx.stroke();

        ctx.fillStyle = "#fff"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "left";
        ctx.fillText("生存者: " + aliveCount, 50, 80);

        if (alertTimer > 0) {
            alertTimer--;
            ctx.fillStyle = `rgba(255, 50, 50, ${Math.min(1, alertTimer / 60)})`;
            ctx.font = "bold 80px sans-serif"; ctx.textAlign = "center";
            ctx.shadowBlur = 30; ctx.shadowColor = "red";
            ctx.fillText(alertMessage, canvas.width / 2, canvas.height / 4);
            ctx.shadowBlur = 0;
        }

        if (aliveCount <= 1) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.fillStyle = "#FFD700";
            ctx.shadowBlur = 30; ctx.shadowColor = "#FFD700";
            
            if (aliveCount === 1 && mainWinner) {
                ctx.font = "bold 100px sans-serif";
                ctx.fillText("👑 勝者: " + mainWinner.roleName + " 👑", canvas.width / 2, canvas.height / 2 - 60);
                ctx.font = "50px sans-serif"; ctx.shadowBlur = 0;
                ctx.fillText(`撃破数: ${mainWinner.kills} / 残りHP: ${Math.floor(mainWinner.hp)}`, canvas.width / 2, canvas.height / 2 + 50);
            } else {
                ctx.font = "bold 100px sans-serif";
                ctx.fillText("引き分け (全滅)", canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;
            }

            ctx.fillStyle = "#aaa"; ctx.font = "40px sans-serif";
            ctx.fillText("- 画面をクリックして次の戦いへ -", canvas.width / 2, canvas.height / 2 + 200);
            
            canvas.addEventListener('click', () => location.reload(), { once: true });
            
            return;
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
