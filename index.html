<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>超強化版！400の役職バトルロイヤル</title>
<style>
    body {
        margin: 0;
        background-color: #050505;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
    }
    h1 { margin: 10px 0; font-size: 24px; text-shadow: 0 0 15px #ff0055; }
    canvas {
        background-color: #111122;
        border: 2px solid #444;
        border-radius: 8px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.9);
    }
    #controls { margin-top: 15px; }
    button {
        padding: 10px 20px; font-size: 16px; cursor: pointer;
        background: linear-gradient(45deg, #ff0055, #ffaa00);
        color: white; border: none; border-radius: 5px; font-weight: bold;
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.6);
    }
    button:hover { filter: brightness(1.2); }
</style>
</head>
<body>

<h1>超強化版！400の役職バトルロイヤル</h1>
<canvas id="gameCanvas" width="1000" height="700"></canvas>
<div id="controls">
    <button onclick="location.reload()">新たな100人を戦わせる</button>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const adjectives = ["炎の", "氷の", "雷の", "光の", "闇の", "風の", "土の", "毒の", "鉄の", "幻の", "水の", "星の", "竜の", "霊の", "血の", "鋼の", "獣の", "聖なる", "魔の", "影の"];
    const nouns = ["戦士", "魔法使い", "僧侶", "盗賊", "狩人", "騎士", "暗殺者", "召喚士", "賢者", "武闘家", "狂戦士", "狙撃手", "踊り子", "巨漢", "吸血鬼", "死霊術師", "錬金術師", "吟遊詩人", "侍", "忍者"];
    
    let roles = [];
    for (let a of adjectives) for (let n of nouns) roles.push({ name: a + n, adj: a, noun: n });
    roles.sort(() => Math.random() - 0.5);

    let circles = [];
    let projectiles = [];
    let trails = [];
    let particles = [];

    // エリアの縮小スピードを大幅に低下
    let safeZone = {
        x: canvas.width / 2,
        y: canvas.height / 2,
        r: 900, 
        targetX: Math.random() * (canvas.width - 300) + 150,
        targetY: Math.random() * (canvas.height - 300) + 150
    };

    class Particle {
        constructor(x, y, color, size, speed) {
            this.x = x; this.y = y;
            const angle = Math.random() * Math.PI * 2;
            const s = Math.random() * speed;
            this.vx = Math.cos(angle) * s; this.vy = Math.sin(angle) * s;
            this.color = color; this.size = size; this.life = 1.0;
            this.decay = Math.random() * 0.02 + 0.01;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; }
        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            ctx.globalAlpha = 1.0;
        }
    }

    function createExplosion(x, y, color, count, size, speed) {
        for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, size, speed));
    }

    class Circle {
        constructor(id, roleObj, isClone = false, startX, startY) {
            this.id = isClone ? id + "_clone" : id;
            this.roleName = roleObj.name;
            this.adj = roleObj.adj;
            this.noun = roleObj.noun;
            this.isClone = isClone;
            
            this.r = 14;
            this.baseSpeed = Math.random() * 1.5 + 1.2;
            this.maxHp = Math.floor(Math.random() * 60) + 60; 
            this.attack = Math.floor(Math.random() * 8) + 8;
            this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            this.opacity = 1.0;

            this.evasion = 0; this.defense = 0; this.knockbackResist = 1.0;
            this.ignoreDef = false; this.immune = false; this.shield = false; this.firstStrike = false;
            this.burn = 0; this.slow = 0; this.poison = 0;
            this.cooldown = 0; this.timer = 0; this.kills = 0;

            // 超強化された属性
            switch(this.adj) {
                case "雷の": this.baseSpeed *= 2.5; break; // 超速
                case "土の": this.defense += 15; break; // 鉄壁
                case "鉄の": this.reflect = true; break;
                case "幻の": this.evasion += 0.50; break; // 50%回避
                case "水の": this.immune = true; break;
                case "竜の": this.maxHp *= 3.0; this.attack *= 2.0; this.r += 6; break; // ボス級ステータス
                case "霊の": this.ignoreDef = true; this.opacity = 0.7; break;
                case "血の": this.maxHp *= 0.3; this.attack *= 5.0; break; // 超特化ガラス大砲
                case "鋼の": this.maxHp *= 3.0; this.baseSpeed *= 0.5; this.knockbackResist = 0.05; break;
                case "影の": this.evasion += 0.6; this.opacity = 0.4; break;
            }

            // 超強化された職業
            switch(this.noun) {
                case "戦士": this.maxHp += 80; this.attack += 10; break;
                case "巨漢": this.r *= 3.0; this.maxHp *= 5.0; this.knockbackResist = 0.1; break; // 超巨大化
                case "狙撃手": this.baseSpeed *= 0.1; break;
                case "侍": this.firstStrike = true; break; // 一撃必殺フラグ
            }

            this.hp = this.maxHp;
            this.currentSpeed = this.baseSpeed;
            this.x = startX || Math.random() * (canvas.width - this.r * 2) + this.r;
            this.y = startY || Math.random() * (canvas.height - this.r * 2) + this.r;
            const angle = Math.random() * Math.PI * 2;
            this.vx = Math.cos(angle) * this.currentSpeed;
            this.vy = Math.sin(angle) * this.currentSpeed;
        }

        update() {
            if (this.hp <= 0) return;
            this.timer++;
            if (this.cooldown > 0) this.cooldown--;

            // エリア外ダメージ
            let distToSafe = Math.hypot(this.x - safeZone.x, this.y - safeZone.y);
            if (distToSafe > safeZone.r) {
                this.hp -= 0.5; // エリアダメージも少し増加
                if(this.timer % 5 === 0) createExplosion(this.x, this.y, "red", 2, 3, 2);
            }

            // 状態異常（ダメージ倍増）
            if (this.burn > 0) { this.hp -= 0.5; this.burn--; createExplosion(this.x, this.y, "orange", 1, 3, 1); }
            if (this.poison > 0) { this.hp -= this.maxHp * 0.005; this.poison--; }
            if (this.slow > 0) { this.currentSpeed = this.baseSpeed * 0.2; this.slow--; } else { this.currentSpeed = this.baseSpeed; }

            // アクティブ能力（ぶっ壊れ化）
            if (this.noun === "魔法使い" && this.timer % 60 === 0) this.shoot8Way(6, this.attack); // 8方向弾幕
            if (this.noun === "狙撃手" && this.timer % 80 === 0) this.shoot(30, this.attack * 8, true); // 弾速30・威力8倍レーザー
            if (this.noun === "錬金術師" && this.timer % 15 === 0) trails.push({ x: this.x, y: this.y, life: 200, owner: this, r: 40 }); // 超巨大毒沼
            if (this.noun === "僧侶" && this.hp < this.maxHp * 0.5 && !this.usedPriestHeal) {
                this.hp += this.maxHp * 1.5; this.usedPriestHeal = true; // HP1.5倍分の大回復
                createExplosion(this.x, this.y, "lime", 50, 5, 5);
            }
            if (this.noun === "踊り子" && this.timer % 20 === 0) {
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * this.currentSpeed * 6; // 超高速ステップ
                this.vy = Math.sin(angle) * this.currentSpeed * 6;
                createExplosion(this.x, this.y, this.color, 10, 4, 2);
            }
            if (this.adj === "聖なる" && this.timer % 80 === 0) this.shield = true; // バリア頻度UP
            if (this.noun === "忍者" && this.timer % 100 === 0) {
                createExplosion(this.x, this.y, "white", 20, 4, 4);
                this.teleportBehindNearest();
            }

            // 移動
            let speedMod = Math.hypot(this.vx, this.vy);
            if (speedMod > 0) {
                this.vx = (this.vx / speedMod) * this.currentSpeed;
                this.vy = (this.vy / speedMod) * this.currentSpeed;
            }
            this.x += this.vx; this.y += this.vy;

            // 壁バウンド
            if (this.x - this.r < 0 || this.x + this.r > canvas.width) this.vx *= -1;
            if (this.y - this.r < 0 || this.y + this.r > canvas.height) this.vy *= -1;
            this.x = Math.max(this.r, Math.min(this.x, canvas.width - this.r));
            this.y = Math.max(this.r, Math.min(this.y, canvas.height - this.r));

            // 衝突判定
            for (let other of circles) {
                if (other.id === this.id || other.hp <= 0) continue;
                let dx = this.x - other.x; let dy = this.y - other.y;
                let dist = Math.hypot(dx, dy);

                if (dist < this.r + other.r) {
                    let push = 5 * this.knockbackResist;
                    if (this.adj === "風の") { push = 40 * this.knockbackResist; createExplosion(this.x, this.y, "white", 10, 3, 8); } // 画面端まで飛ぶノックバック
                    this.vx = (dx / dist) * push; this.vy = (dy / dist) * push;

                    if (this.cooldown === 0) {
                        this.dealDamageTo(other);
                        this.cooldown = this.noun === "武闘家" ? 2 : 10; // 武闘家はクールタイムほぼゼロのラッシュ
                        if (other.noun === "騎士") other.cooldown = 20;
                    }
                }
            }
        }

        dealDamageTo(target) {
            if (Math.random() < target.evasion && !this.ignoreDef) { createExplosion(target.x, target.y, "gray", 5, 2, 2); return; }
            if (target.shield) { target.shield = false; createExplosion(target.x, target.y, "gold", 20, 4, 5); return; }

            // 狂戦士はHPが減ると最大4倍のダメージ
            let actualDamage = this.noun === "狂戦士" ? this.attack * (1 + (3 * (1 - this.hp / this.maxHp))) : this.attack;
            
            if (this.noun === "暗殺者" && Math.random() < 0.20) { 
                actualDamage *= 10; // クリティカル10倍
                createExplosion(target.x, target.y, "red", 40, 6, 10);
            }
            if (this.firstStrike) { 
                actualDamage *= 20; this.firstStrike = false; // 侍の初撃20倍
                createExplosion(target.x, target.y, "white", 60, 5, 15);
            }

            if (!this.ignoreDef) actualDamage = Math.max(1, actualDamage - target.defense);
            target.hp -= actualDamage;
            createExplosion(target.x, target.y, this.color, 5, 3, 4);

            if (!target.immune) {
                if (this.adj === "炎の") target.burn = 120;
                if (this.adj === "氷の") target.slow = 120;
                if (this.adj === "毒の") target.poison = 120;
            }

            if (this.adj === "闇の") this.hp = Math.min(this.maxHp, this.hp + actualDamage); // 吸血100%
            if (target.adj === "鉄の") this.hp -= actualDamage * 0.8; // 反射80%

            if (target.hp <= 0) {
                this.kills++;
                createExplosion(target.x, target.y, target.color, 80, 5, 10);
                if (this.noun === "吸血鬼") { this.hp = this.maxHp; createExplosion(this.x, this.y, "red", 30, 4, 4); }
                handleDeath(target);
            }
        }

        shoot(speed, dmg, isLaser = false) {
            let target = this.getNearestEnemy();
            if (!target) return;
            let dx = target.x - this.x; let dy = target.y - this.y;
            let dist = Math.hypot(dx, dy);
            projectiles.push({
                x: this.x, y: this.y, vx: (dx/dist)*speed, vy: (dy/dist)*speed,
                dmg: dmg, owner: this, life: isLaser ? 200 : 100, size: isLaser ? 12 : 5, color: isLaser ? "#ff00ff" : "cyan"
            });
        }

        shoot8Way(speed, dmg) {
            // 魔法使いの8方向弾幕
            for (let i = 0; i < 8; i++) {
                let angle = (Math.PI / 4) * i;
                projectiles.push({
                    x: this.x, y: this.y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                    dmg: dmg, owner: this, life: 100, size: 6, color: "#00ffff"
                });
            }
        }

        getNearestEnemy() {
            let target = null, minDist = 9999;
            for (let c of circles) {
                if (c.id !== this.id && c.hp > 0) {
                    let d = Math.hypot(this.x - c.x, this.y - c.y);
                    if (d < minDist) { minDist = d; target = c; }
                }
            }
            return target;
        }

        teleportBehindNearest() {
            let target = this.getNearestEnemy();
            if (target) { this.x = target.x - target.vx * 20; this.y = target.y - target.vy * 20; }
        }

        draw() {
            if (this.hp <= 0) return;
            ctx.globalAlpha = this.opacity;

            if (this.shield) {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.r + 8, 0, Math.PI * 2);
                ctx.strokeStyle = "gold"; ctx.lineWidth = 4; ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.globalAlpha = 1.0;
            ctx.fillStyle = "#fff"; ctx.font = "12px sans-serif"; ctx.textAlign = "center";
            ctx.fillText(this.isClone ? "分身" : this.roleName, this.x, this.y - this.r - 10);

            const barWidth = this.r * 2.5; // 丸の大きさに合わせてHPバーも大きく
            ctx.fillStyle = "red"; ctx.fillRect(this.x - barWidth / 2, this.y - this.r - 6, barWidth, 5);
            ctx.fillStyle = "lime"; ctx.fillRect(this.x - barWidth / 2, this.y - this.r - 6, barWidth * (this.hp / this.maxHp), 5);
        }
    }

    function handleDeath(deadCircle) {
        if (deadCircle.noun === "召喚士" && !deadCircle.isClone) {
            for(let i=0; i<5; i++) { // 召喚士の分身が5体に増量
                let clone = new Circle(deadCircle.id, {name: "分身", adj: "無", noun: "無"}, true, deadCircle.x + (Math.random()*60-30), deadCircle.y + (Math.random()*60-30));
                clone.maxHp = 60; clone.hp = 60; clone.attack = deadCircle.attack; clone.r = 12; clone.color = deadCircle.color;
                circles.push(clone);
                createExplosion(clone.x, clone.y, "purple", 15, 4, 5);
            }
        }
        for (let c of circles) {
            if (c.hp > 0 && c.noun === "死霊術師") {
                // 死霊術師のレイドボス化（ステータス激増）
                c.maxHp += 40; c.hp += 40; c.attack += 8; c.r += 1.5;
                createExplosion(c.x, c.y, "black", 20, 5, 3);
            }
        }
    }

    for (let i = 0; i < 100; i++) circles.push(new Circle(i, roles[i]));

    function loop() {
        ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, canvas.width, canvas.height);

        // エリアの縮小スピードを0.35 -> 0.08に大幅低下
        safeZone.r -= 0.08; 
        if (safeZone.r < 0) safeZone.r = 0;
        // 中心の移動スピードも低下
        safeZone.x += (safeZone.targetX - safeZone.x) * 0.001; 
        safeZone.y += (safeZone.targetY - safeZone.y) * 0.001;

        // 毒沼
        for (let i = trails.length - 1; i >= 0; i--) {
            let t = trails[i]; t.life--;
            ctx.fillStyle = `rgba(148, 0, 211, ${t.life / 200 * 0.7})`;
            ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.fill();
            for (let c of circles) {
                if (c.hp > 0 && c.id !== t.owner.id && Math.hypot(c.x - t.x, c.y - t.y) < t.r + c.r) {
                    if(!c.immune) { c.hp -= 0.8; createExplosion(c.x, c.y, "purple", 2, 3, 2); }
                }
            }
            if (t.life <= 0) trails.splice(i, 1);
        }

        // 弾
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.vx; p.y += p.vy; p.life--;
            ctx.fillStyle = p.color; ctx.shadowBlur = 15; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0; 

            let hit = false;
            for (let c of circles) {
                if (c.hp > 0 && c.id !== p.owner.id && Math.hypot(c.x - p.x, c.y - p.y) < p.size + c.r) {
                    p.owner.dealDamageTo(c); hit = true; break;
                }
            }
            if (hit || p.life <= 0) projectiles.splice(i, 1);
        }

        let aliveCount = 0; let mainWinner = null;
        for (let c of circles) {
            c.update(); c.draw();
            if (c.hp > 0) { aliveCount++; if (!c.isClone) mainWinner = c; }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update(); particles[i].draw();
            if (particles[i].life <= 0) particles.splice(i, 1);
        }

        // ストーム描画
        ctx.fillStyle = "rgba(255, 0, 0, 0.25)";
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height); 
        ctx.arc(safeZone.x, safeZone.y, safeZone.r, 0, Math.PI * 2, true); 
        ctx.fill();

        ctx.strokeStyle = "rgba(255, 50, 50, 0.9)"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(safeZone.x, safeZone.y, safeZone.r, 0, Math.PI * 2); ctx.stroke();

        ctx.fillStyle = "#fff"; ctx.font = "20px sans-serif"; ctx.textAlign = "left";
        ctx.fillText("生存者: " + aliveCount, 15, 30);

        if (aliveCount <= 1) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center"; ctx.font = "50px sans-serif"; ctx.fillStyle = "#FFD700";
            ctx.shadowBlur = 20; ctx.shadowColor = "#FFD700";
            if (aliveCount === 1 && mainWinner) {
                ctx.fillText("👑 勝者: " + mainWinner.roleName + " 👑", canvas.width / 2, canvas.height / 2 - 20);
                ctx.font = "24px sans-serif"; ctx.shadowBlur = 0;
                ctx.fillText(`撃破数: ${mainWinner.kills} / 残りHP: ${Math.floor(mainWinner.hp)}`, canvas.width / 2, canvas.height / 2 + 30);
            } else {
                ctx.fillText("引き分け (全滅)", canvas.width / 2, canvas.height / 2);
            }
            return;
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>
